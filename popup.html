<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { width: 280px; padding: 15px; font-family: Arial, sans-serif; margin: 0; }
        h3 { color: #333; margin-top: 0; }
        .upload-container { display: flex; flex-direction: column; gap: 12px; }
        input[type="file"] { display: none; }
        .custom-btn {
            width: 100%; padding: 10px; background-color: #002ff7; color: white;
            border: none; border-radius: 4px; cursor: pointer; text-align: center;
            font-weight: bold; font-size: 14px; transition: background 0.2s;
        }
        .custom-btn:hover { background-color: #001cc4; }
        #status { font-size: 12px; color: #666; text-align: center; word-break: break-all; }
    </style>
</head>
<body>
    <h3>Indeed AI Helper</h3>
    <div class="upload-container">
        <input type="file" id="resume-file" accept=".pdf">
        <button id="upload-btn" class="custom-btn">Select & Upload PDF</button>
        <div id="status">Status: Ready to upload</div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
