<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      width: 340px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f8fafc;
      color: #1e293b;
    }
    h3 {
      margin: 0 0 16px 0;
      font-size: 18px;
      font-weight: 700;
      color: #0f172a;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h3 .logo-dot {
      width: 8px;
      height: 8px;
      background-color: #2563eb;
      border-radius: 50%;
    }
    .card {
      background: #ffffff;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05), 0 1px 2px -1px rgba(0, 0, 0, 0.05);
      border: 1px solid #e2e8f0;
      margin-bottom: 12px;
    }
    .upload-box {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    input[type="file"] {
      display: none;
    }
    .btn {
      width: 100%;
      padding: 11px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .btn-primary {
      background-color: #2563eb;
      color: #ffffff;
    }
    .btn-primary:hover {
      background-color: #1d4ed8;
    }
    .btn-secondary {
      background-color: #f1f5f9;
      color: #334155;
      border: 1px solid #e2e8f0;
    }
    .btn-secondary:hover {
      background-color: #e2e8f0;
    }
    #status {
      font-size: 12px;
      color: #64748b;
      text-align: center;
      margin-top: 4px;
      word-break: break-all;
    }
    /* 结果分析面板样式 */
    #analysisResult {
      margin-top: 4px;
      font-size: 13px;
      line-height: 1.6;
      color: #334155;
    }
    .empty-state {
      text-align: center;
      color: #94a3b8;
      padding: 20px 0;
      font-size: 13px;
    }
    /* 强力渲染生成的漂亮结构 */
    .score-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 16px;
    }
    .section-title {
      font-size: 14px;
      font-weight: 700;
      color: #0f172a;
      margin: 16px 0 8px 0;
      padding-left: 8px;
      border-left: 3px solid #2563eb;
    }
    .bullet-item {
      margin-bottom: 6px;
      padding-left: 4px;
    }
  </style>
</head>
<body>
  <h3><span class="logo-dot"></span>AI Copilot Partner</h3>
  
  <div class="card upload-box">
    <input type="file" id="resume-file" accept=".pdf">
    <button id="upload-btn" class="btn btn-secondary">📁 Select Resume PDF</button>
    <div id="status">Ready to analyze</div>
  </div>

  <button id="match-btn" class="btn btn-primary" style="margin-bottom: 12px;">⚡ Analyze Job Match</button>

  <div id="analysisResult" class="card">
    <div class="empty-state">Waiting for analysis...</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
